<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distributed Comm Sim — Ride-Hailing</title>
    <meta name="description" content="Interactive simulation of 4 distributed communication models using a Ride-Hailing case study: Request-Response, Pub-Sub, Message Queue, and RPC." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header id="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <i data-lucide="rocket" class="brand-icon"></i>
          <div>
            <h1 class="brand-title">Simulasi Komunikasi Terdistribusi</h1>
            <p class="brand-subtitle">Studi Kasus Ride-Hailing</p>
          </div>
        </div>
        <div id="connection-badge" class="badge badge--disconnected"><i data-lucide="circle-slash" style="width:12px;height:12px;margin-bottom:-2px;"></i> Terputus</div>
      </div>
    </header>

    <main id="app-main">
      <!-- Canvas section -->
      <section id="canvas-section">
        <canvas id="topology-canvas"></canvas>
        <div id="canvas-overlay-label">Topology View</div>
      </section>

      <!-- Right sidebar -->
      <aside id="sidebar">
        <!-- Control Panel -->
        <div class="panel" id="control-panel">
          <h2 class="panel-title" style="display:flex; gap:6px; align-items:center;"><i data-lucide="sliders-horizontal" style="width:16px;"></i> Panel Kendali</h2>

          <div class="form-group">
            <label class="form-label" for="model-select">Model Komunikasi</label>
            <select id="model-select" class="form-select">
              <option value="req-res">Request-Response (REST)</option>
              <option value="pub-sub">Publish-Subscribe (MQTT)</option>
              <option value="queue">Message Queue (MQTT)</option>
              <option value="rpc">RPC (Route Calc)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="latency-slider">
              Latensi Jaringan: <span id="latency-val" class="form-value">500</span> ms
            </label>
            <input id="latency-slider" type="range" min="0" max="2000" value="500" class="form-range" />
          </div>

          <div class="form-group">
            <label class="form-label" for="driver-slider">
              Jumlah Pengemudi: <span id="driver-val" class="form-value">3</span>
            </label>
            <input id="driver-slider" type="range" min="1" max="10" value="3" class="form-range" />
          </div>

          <button id="trigger-btn" class="btn btn--primary">
            <span id="btn-text">Jalankan Simulasi</span>
            <span id="btn-spinner" class="spinner hidden"></span>
          </button>

          <!-- Model description -->
          <div id="model-desc" class="model-desc"></div>
        </div>

        <!-- Metrics + Log -->
        <div class="panel panel--grow" id="metrics-panel">
          <h2 class="panel-title" style="display:flex; gap:6px; align-items:center;"><i data-lucide="bar-chart-2" style="width:16px;"></i> Metrik Kinerja</h2>
          <div id="metrics-widget" class="metrics-grid"></div>
          <div class="log-header">Log Urutan Pesan</div>
          <div id="sequence-log" class="sequence-log"></div>
        </div>
      </aside>
    </main>

    <script>
      lucide.createIcons();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
